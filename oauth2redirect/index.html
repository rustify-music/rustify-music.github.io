<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rustify - Vinculación de Cuenta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #06020f 100%);
            --accent-glow: radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.15) 0%, transparent 60%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.07);
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --brand-primary: #8a2be2;
            --brand-success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--accent-glow);
            z-index: 0;
            pointer-events: none;
        }

        /* Ambient floating light particles for visual interest */
        .ambient-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(138, 43, 226, 0.2);
            filter: blur(100px);
            z-index: 0;
            animation: float-around 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            top: -50px;
            right: -50px;
        }

        .orb-2 {
            bottom: -50px;
            left: -50px;
            background: rgba(16, 185, 129, 0.1);
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 480px;
            padding: 40px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .success-illustration {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 30px auto;
        }

        .circle-bg {
            width: 100%;
            height: 100%;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(16, 185, 129, 0.2);
            animation: pulse-ring 2s infinite;
        }

        .checkmark-icon {
            width: 36px;
            height: 36px;
            fill: none;
            stroke: var(--brand-success);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: draw-checkmark 0.6s 0.3s ease-out forwards;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .app-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--brand-success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--brand-success);
        }

        .close-hint {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
            margin-top: 10px;
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes draw-checkmark {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(16, 185, 129, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        @keyframes float-around {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(30px, -20px) scale(1.1);
            }
            100% {
                transform: translate(-20px, 30px) scale(0.9);
            }
        }
    </style>
</head>
<body>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="container">
        <div class="success-illustration">
            <div class="circle-bg">
                <svg class="checkmark-icon" viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
        </div>

        <div class="app-status">
            <span class="status-dot"></span>
            <span>Sesión autorizada</span>
        </div>

        <h1>¡Conexión completada!</h1>
        <p>Google Drive se ha vinculado correctamente con tu aplicación Rustify. El flujo de autenticación ha finalizado.</p>
        
        <div class="close-hint">
            Ya puedes cerrar esta ventana y regresar a Rustify para comenzar a sincronizar tus datos.
        </div>
    </div>
</body>
</html>
